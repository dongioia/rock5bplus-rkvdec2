# Rock 5B+ Performance Tuning — Fase 1
# Deploy to: /etc/sysctl.d/99-rock5b-perf.conf

# ZRAM: ottimizzato per compressed swap
vm.swappiness = 180
vm.page-cluster = 0
vm.watermark_boost_factor = 0
vm.watermark_scale_factor = 125

# THP: madvise mode (applicazioni devono richiedere esplicitamente)
# Gestito via /sys/kernel/mm/transparent_hugepage/enabled = madvise

# Dirty page writeback: più aggressivo per media server
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5

# Network: basic tuning
net.core.default_qdisc = fq_codel
